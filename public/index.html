<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#04080f">
    <meta name="description"
        content="Binaural beats for brain reset. Delta, Theta, Alpha & Gamma waves. Use headphones.">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ResetWave">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <title>ResetWave — Neural Reset Through Sound</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@100;300&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap');

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            –bg: #04080f;
            –teal: #00d4c8;
            –blue: #0099ff;
            –glow: #00f5ff;
            –text: #a8ccd8;
            –white: #e8f4f8;
        }

        html,
        body {
            height: 100%;
        }

        body {
            background: var(–bg);
            color: var(–text);
            font-family: 'Josefin Sans', sans-serif;
            min-height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 50% at 50% 60%, rgba(0, 153, 255, 0.06) 0%, transparent 70%),
                radial-gradient(ellipse 40% 30% at 30% 30%, rgba(0, 212, 200, 0.04) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 70% 70%, rgba(0, 80, 120, 0.05) 0%, transparent 60%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            inset: -50%;
            width: 200%;
            height: 200%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity=' 1'/%3E%3C/svg%3E");
 opacity: 0.025;
            pointer-events: none;
            animation: grain 8s steps(10) infinite;
        }

        @keyframes grain {

            0%,
            100% {
                transform: translate(0, 0)
            }

            10% {
                transform: translate(-2%, -3%)
            }

            20% {
                transform: translate(3%, 1%)
            }

            30% {
                transform: translate(-1%, 4%)
            }

            40% {
                transform: translate(4%, -2%)
            }

            50% {
                transform: translate(-3%, 2%)
            }

            60% {
                transform: translate(2%, -4%)
            }

            70% {
                transform: translate(-4%, 3%)
            }

            80% {
                transform: translate(1%, -1%)
            }

            90% {
                transform: translate(3%, 4%)
            }
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            z-index: 1;
            width: 100%;
            max-width: 700px;
            padding: 40px 24px;
        }

        .header {
            text-align: center;
        }

        .eyebrow {
            font-size: 10px;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: var(–teal);
            opacity: 0.7;
            margin-bottom: 14px;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-style: italic;
            font-size: clamp(2.4rem, 6vw, 3.6rem);
            color: var(–white);
            line-height: 1.1;
        }

        h1 span {
            color: var(–teal);
        }

        .subtitle {
            margin-top: 12px;
            font-size: 11px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            opacity: 0.45;
        }

        .visualizer-wrap {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        canvas {
            width: 100%;
            max-width: 640px;
            height: 140px;
            display: block;
        }

        .glow-line {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(–teal), transparent);
            opacity: 0;
            transition: opacity 0.6s;
        }

        .playing .glow-line {
            opacity: 0.6;
        }

        .freq-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            width: 100%;
        }

        .freq-btn {
            background: rgba(0, 153, 255, 0.04);
            border: 1px solid rgba(0, 212, 200, 0.12);
            color: var(–text);
            font-family: 'Josefin Sans', sans-serif;
            font-size: 11px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 14px 8px 12px;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            position: relative;
            overflow: hidden;
        }

        .freq-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0, 212, 200, 0.08), rgba(0, 153, 255, 0.04));
            opacity: 0;
            transition: opacity 0.25s;
        }

        .freq-btn:hover::before,
        .freq-btn.active::before {
            opacity: 1;
        }

        .freq-btn:hover {
            border-color: rgba(0, 212, 200, 0.35);
            color: var(–white);
        }

        .freq-btn.active {
            border-color: var(–teal);
            color: var(–glow);
            box-shadow: 0 0 20px rgba(0, 212, 200, 0.1), inset 0 0 20px rgba(0, 212, 200, 0.04);
        }

        .freq-hz {
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
            font-weight: 300;
            line-height: 1;
            color: inherit;
        }

        .freq-name {
            font-size: 9px;
            letter-spacing: 0.2em;
            opacity: 0.65;
        }

        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
            width: 100%;
        }

        .play-wrap {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-btn {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            border: 1px solid rgba(0, 212, 200, 0.3);
            background: rgba(0, 212, 200, 0.05);
            color: var(–teal);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            position: relative;
            z-index: 1;
        }

        .play-btn::before {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 1px solid rgba(0, 212, 200, 0.08);
            transition: all 0.3s;
        }

        .play-btn:hover {
            border-color: var(–teal);
            background: rgba(0, 212, 200, 0.1);
            box-shadow: 0 0 30px rgba(0, 212, 200, 0.15);
        }

        .play-btn.active {
            border-color: var(–glow);
            background: rgba(0, 245, 255, 0.08);
            box-shadow: 0 0 40px rgba(0, 245, 255, 0.2);
        }

        .ripples {
            position: absolute;
            display: none;
        }

        .playing .ripples {
            display: block;
        }

        .ripple-ring {
            position: absolute;
            width: 68px;
            height: 68px;
            border-radius: 50%;
            border: 1px solid rgba(0, 212, 200, 0.4);
            animation: ripple 2.5s ease-out infinite;
            pointer-events: none;
            top: 0;
            left: 0;
        }

        .ripple-ring:nth-child(2) {
            animation-delay: 0.8s;
        }

        .ripple-ring:nth-child(3) {
            animation-delay: 1.6s;
        }

        @keyframes ripple {
            0% {
                transform: scale(1);
                opacity: 0.6;
            }

            100% {
                transform: scale(3);
                opacity: 0;
            }
        }

        .vol-row {
            display: flex;
            align-items: center;
            gap: 16px;
            width: 100%;
            max-width: 320px;
        }

        .vol-label {
            font-size: 9px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            opacity: 0.4;
            white-space: nowrap;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 2px;
            background: rgba(0, 212, 200, 0.15);
            outline: none;
            border-radius: 2px;
            cursor: pointer;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(–teal);
            box-shadow: 0 0 10px rgba(0, 212, 200, 0.5);
            cursor: pointer;
            transition: transform 0.2s;
        }

        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.3);
        }

        .timer-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .timer-btn {
            background: rgba(0, 80, 120, 0.15);
            border: 1px solid rgba(0, 212, 200, 0.1);
            color: var(–text);
            font-family: 'Josefin Sans', sans-serif;
            font-size: 10px;
            letter-spacing: 0.2em;
            padding: 6px 14px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .timer-btn:hover,
        .timer-btn.sel {
            border-color: rgba(0, 212, 200, 0.35);
            color: var(–teal);
        }

        .timer-btn.sel {
            background: rgba(0, 212, 200, 0.06);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(0, 212, 200, 0.15);
            padding: 5px 14px;
            font-size: 9px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(0, 212, 200, 0.5);
        }

        .badge-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(–teal);
            opacity: 0.5;
        }

        .badge-dot.pulse {
            animation: bpulse 2s ease-in-out infinite;
            opacity: 1;
        }

        @keyframes bpulse {

            0%,
            100% {
                opacity: 0.3;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.4);
            }
        }

        .status {
            font-size: 10px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            opacity: 0;
            color: var(–teal);
            transition: opacity 0.5s;
            text-align: center;
        }

        .status.show {
            opacity: 0.55;
        }

        /* Background audio notice */
        .bg-notice {
            font-size: 9px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            opacity: 0.3;
            text-align: center;
            margin-top: -20px;
        }

        /* PWA install banner */
        #installBanner {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 20, 35, 0.95);
            border: 1px solid rgba(0, 212, 200, 0.2);
            padding: 14px 20px;
            display: none;
            align-items: center;
            gap: 14px;
            font-size: 11px;
            letter-spacing: 0.1em;
            z-index: 100;
            backdrop-filter: blur(10px);
            white-space: nowrap;
        }

        #installBanner.show {
            display: flex;
        }

        #installBtn {
            background: rgba(0, 212, 200, 0.1);
            border: 1px solid rgba(0, 212, 200, 0.4);
            color: var(–teal);
            font-family: 'Josefin Sans', sans-serif;
            font-size: 10px;
            letter-spacing: 0.2em;
            padding: 6px 14px;
            cursor: pointer;
            text-transform: uppercase;
        }

        #dismissBtn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            font-size: 16px;
            line-height: 1;
            padding: 0 4px;
        }
    </style>

</head>

<body>

    <div class="container">
        <div class="header">
            <div class="eyebrow">Neural Entrainment · Binaural Therapy</div>
            <h1>Reset <span>the</span> Signal</h1>
            <div class="subtitle">Use headphones for binaural effect</div>
        </div>

        <div class="visualizer-wrap" id="vizWrap">
            <canvas id="waveCanvas"></canvas>
            <div class="glow-line"></div>
        </div>

        <div class="freq-grid">
            <button class="freq-btn" data-base="200" data-beat="4" data-label="Delta">
                <span class="freq-hz">4 Hz</span>
                <span class="freq-name">Delta</span>
            </button>
            <button class="freq-btn active" data-base="200" data-beat="8" data-label="Theta">
                <span class="freq-hz">8 Hz</span>
                <span class="freq-name">Theta</span>
            </button>
            <button class="freq-btn" data-base="200" data-beat="10" data-label="Alpha">
                <span class="freq-hz">10 Hz</span>
                <span class="freq-name">Alpha</span>
            </button>
            <button class="freq-btn" data-base="200" data-beat="40" data-label="Gamma">
                <span class="freq-hz">40 Hz</span>
                <span class="freq-name">Gamma</span>
            </button>
        </div>

        <div class="controls">
            <div class="play-wrap" id="playWrap">
                <div class="ripples">
                    <div class="ripple-ring"></div>
                    <div class="ripple-ring"></div>
                    <div class="ripple-ring"></div>
                </div>
                <button class="play-btn" id="playBtn">
                    <svg id="playIcon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <polygon points="6,4 20,12 6,20" />
                    </svg>
                </button>
            </div>

            ```
            <div class="vol-row">
                <span class="vol-label">Vol</span>
                <input type="range" id="volSlider" min="0" max="1" step="0.01" value="0.35">
                <span class="vol-label">Max</span>
            </div>

            <div class="timer-row">
                <button class="timer-btn sel" data-min="0">∞</button>
                <button class="timer-btn" data-min="5">5 min</button>
                <button class="timer-btn" data-min="10">10 min</button>
                <button class="timer-btn" data-min="20">20 min</button>
            </div>

            <div class="badge">
                <div class="badge-dot" id="badgeDot"></div>
                Binaural beats active
            </div>

            <div class="status" id="status">Awaiting signal</div>
            <div class="bg-notice">Continues playing in background &amp; locked screen</div>
            ```

        </div>
    </div>

    <!-- PWA Install Banner -->

    <div id="installBanner">
        <span>Add to home screen for best experience</span>
        <button id="installBtn">Install</button>
        <button id="dismissBtn">✕</button>
    </div>

    <script>
        (function () {
            // ── State ──────────────────────────────────────────────
            let audioCtx = null, gainNode = null, leftOsc = null, rightOsc = null;
            let playing = false;
            let waveAmplitude = 0;
            let phase = 0, beatPhase = 0;
            let timerTimeout = null;
            let baseFreq = 200, beatFreq = 8;
            let volume = 0.35;

            // ── Elements ───────────────────────────────────────────
            const canvas = document.getElementById('waveCanvas');
            const ctx2d = canvas.getContext('2d');
            const playBtn = document.getElementById('playBtn');
            const playIcon = document.getElementById('playIcon');
            const volSlider = document.getElementById('volSlider');
            const statusEl = document.getElementById('status');
            const vizWrap = document.getElementById('vizWrap');
            const badgeDot = document.getElementById('badgeDot');

            // ── Canvas resize ──────────────────────────────────────
            function resize() {
                canvas.width = canvas.offsetWidth * devicePixelRatio;
                canvas.height = canvas.offsetHeight * devicePixelRatio;
            }
            resize();
            window.addEventListener('resize', resize);

            // ── Audio ──────────────────────────────────────────────
            function startAudio() {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();

                // Unlock on iOS by resuming on user gesture (already inside click)
                if (audioCtx.state === 'suspended') audioCtx.resume();

                gainNode = audioCtx.createGain();
                gainNode.gain.setValueAtTime(volume, audioCtx.currentTime);
                gainNode.connect(audioCtx.destination);

                const merger = audioCtx.createChannelMerger(2);
                merger.connect(gainNode);

                leftOsc = audioCtx.createOscillator();
                rightOsc = audioCtx.createOscillator();
                leftOsc.type = rightOsc.type = 'sine';
                leftOsc.frequency.setValueAtTime(baseFreq, audioCtx.currentTime);
                rightOsc.frequency.setValueAtTime(baseFreq + beatFreq, audioCtx.currentTime);

                const lGain = audioCtx.createGain();
                const rGain = audioCtx.createGain();
                leftOsc.connect(lGain);
                rightOsc.connect(rGain);
                lGain.connect(merger, 0, 0);
                rGain.connect(merger, 0, 1);

                leftOsc.start();
                rightOsc.start();

                setupMediaSession();
            }

            function stopAudio() {
                [leftOsc, rightOsc].forEach(o => { try { o && o.stop(); } catch (e) { } });
                leftOsc = rightOsc = null;
                if (audioCtx) { audioCtx.close(); audioCtx = null; }
                gainNode = null;
                if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'none';
            }

            function updateFrequency() {
                if (!audioCtx) return;
                const t = audioCtx.currentTime;
                leftOsc.frequency.setTargetAtTime(baseFreq, t, 0.05);
                rightOsc.frequency.setTargetAtTime(baseFreq + beatFreq, t, 0.05);
                setupMediaSession();
            }

            // ── Media Session API (lock screen controls) ───────────
            function setupMediaSession() {
                if (!('mediaSession' in navigator)) return;
                const activeBtn = document.querySelector('.freq-btn.active');
                const label = activeBtn ? activeBtn.dataset.label : 'Theta';
                const hz = activeBtn ? activeBtn.querySelector('.freq-hz').textContent : '8 Hz';

                navigator.mediaSession.metadata = new MediaMetadata({
                    title: `${label} Waves — ${hz}`,
                    artist: 'ResetWave',
                    album: 'Neural Entrainment',
                });

                navigator.mediaSession.playbackState = 'playing';

                navigator.mediaSession.setActionHandler('play', () => togglePlay());
                navigator.mediaSession.setActionHandler('pause', () => togglePlay());
                navigator.mediaSession.setActionHandler('stop', () => { if (playing) togglePlay(); });
            }

            // ── Play / Pause ───────────────────────────────────────
            function togglePlay() {
                playing = !playing;
                if (playing) {
                    startAudio();
                    playBtn.classList.add('active');
                    vizWrap.classList.add('playing');
                    playIcon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
                    badgeDot.classList.add('pulse');
                    showStatus(getLabel());
                    startTimer();
                } else {
                    stopAudio();
                    playBtn.classList.remove('active');
                    vizWrap.classList.remove('playing');
                    playIcon.innerHTML = '<polygon points="6,4 20,12 6,20"/>';
                    badgeDot.classList.remove('pulse');
                    showStatus('Session paused');
                    clearTimer();
                }
            }

            playBtn.addEventListener('click', togglePlay);

            // Volume
            volSlider.addEventListener('input', () => {
                volume = parseFloat(volSlider.value);
                if (gainNode) gainNode.gain.setTargetAtTime(volume, audioCtx.currentTime, 0.05);
            });

            // Frequency buttons
            document.querySelectorAll('.freq-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.freq-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    baseFreq = parseFloat(btn.dataset.base);
                    beatFreq = parseFloat(btn.dataset.beat);
                    updateFrequency();
                    if (playing) showStatus(getLabel());
                });
            });

            // Timer buttons
            document.querySelectorAll('.timer-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.timer-btn').forEach(b => b.classList.remove('sel'));
                    btn.classList.add('sel');
                    if (playing) { clearTimer(); startTimer(); }
                });
            });

            function getLabel() {
                const btn = document.querySelector('.freq-btn.active');
                return btn ? `${btn.dataset.label} · ${btn.querySelector('.freq-hz').textContent} binaural` : '';
            }

            function showStatus(msg) {
                statusEl.textContent = msg;
                statusEl.classList.add('show');
            }

            function startTimer() {
                const sel = document.querySelector('.timer-btn.sel');
                const mins = parseInt(sel.dataset.min);
                if (!mins) return;
                timerTimeout = setTimeout(() => {
                    if (playing) togglePlay();
                    showStatus('Session complete');
                }, mins * 60 * 1000);
            }

            function clearTimer() {
                if (timerTimeout) { clearTimeout(timerTimeout); timerTimeout = null; }
            }

            // ── Waveform visualizer ────────────────────────────────
            (function drawLoop() {
                const W = canvas.width, H = canvas.height;
                ctx2d.clearRect(0, 0, W, H);

                waveAmplitude += ((playing ? 1 : 0) - waveAmplitude) * 0.04;
                phase += (baseFreq / 44100) * 4.5;
                beatPhase += (beatFreq / 44100) * 4.5;

                if (waveAmplitude < 0.002) {
                    ctx2d.beginPath();
                    ctx2d.moveTo(0, H / 2);
                    ctx2d.lineTo(W, H / 2);
                    ctx2d.strokeStyle = 'rgba(0,212,200,0.08)';
                    ctx2d.lineWidth = 1;
                    ctx2d.stroke();
                } else {
                    const amp = H * 0.36 * waveAmplitude;
                    for (let w = 0; w < 3; w++) {
                        const op = (1 - w * 0.28) * waveAmplitude;
                        const fm = 1 + w * 0.5;
                        const as = 1 - w * 0.25;
                        const mod = 0.55 + 0.45 * Math.sin(beatPhase * fm * Math.PI * 2);
                        const g = ctx2d.createLinearGradient(0, 0, W, 0);
                        if (w === 0) {
                            g.addColorStop(0, `rgba(0,212,200,0)`);
                            g.addColorStop(0.3, `rgba(0,212,200,${op * 0.9})`);
                            g.addColorStop(0.5, `rgba(0,245,255,${op})`);
                            g.addColorStop(0.7, `rgba(0,153,255,${op * 0.9})`);
                            g.addColorStop(1, `rgba(0,153,255,0)`);
                        } else {
                            g.addColorStop(0, `rgba(0,153,255,0)`);
                            g.addColorStop(0.5, `rgba(0,153,255,${op * 0.4})`);
                            g.addColorStop(1, `rgba(0,153,255,0)`);
                        }
                        ctx2d.beginPath();
                        for (let x = 0; x <= W; x += 2) {
                            const t = x / W;
                            const y = H / 2 + amp * as * mod *
                                Math.sin(t * Math.PI * 8 * fm + phase * Math.PI * 2 * fm) *
                                Math.sin(t * Math.PI);
                            x === 0 ? ctx2d.moveTo(x, y) : ctx2d.lineTo(x, y);
                        }
                        ctx2d.strokeStyle = g;
                        ctx2d.lineWidth = w === 0 ? 2 / devicePixelRatio : 1.2 / devicePixelRatio;
                        ctx2d.shadowColor = 'rgba(0,212,200,0.4)';
                        ctx2d.shadowBlur = w === 0 ? 8 : 0;
                        ctx2d.stroke();
                        ctx2d.shadowBlur = 0;
                    }
                }
                requestAnimationFrame(drawLoop);
            })();

            // ── PWA Install Prompt ─────────────────────────────────
            let deferredPrompt = null;
            const banner = document.getElementById('installBanner');
            const installBtn = document.getElementById('installBtn');
            const dismissBtn = document.getElementById('dismissBtn');

            window.addEventListener('beforeinstallprompt', e => {
                e.preventDefault();
                deferredPrompt = e;
                banner.classList.add('show');
            });

            installBtn.addEventListener('click', async () => {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                deferredPrompt = null;
                banner.classList.remove('show');
            });

            dismissBtn.addEventListener('click', () => banner.classList.remove('show'));

            // ── iOS audio unlock keepalive ─────────────────────────
            // Prevents iOS from suspending AudioContext when screen locks
            document.addEventListener('visibilitychange', () => {
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            });

        })();
    </script>

    <!-- Service Worker registration -->

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(() => { });
            });
        }
    </script>
